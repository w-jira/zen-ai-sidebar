<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════════ HEADER ═══════════════════════════════════ -->
  <header id="header">
    <!-- Left cluster: model dropdown + pin -->
    <div id="header-left">
      <div id="model-dropdown-wrap">
        <button id="model-btn" class="model-btn" aria-haspopup="true" aria-expanded="false">
          <span id="model-name">GPT-4o</span>
          <svg id="model-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg>
        </button>
        <div id="model-menu" class="dropdown-menu" role="menu" aria-label="Select model" style="display:none;">
          <div class="menu-section-label">OpenAI</div>
          <button class="menu-item model-item active" data-model="gpt-4o" role="menuitem">
            <span class="menu-item-name">GPT-4o</span>
            <span class="menu-item-desc">Fast & capable</span>
          </button>
          <button class="menu-item model-item" data-model="gpt-4o-mini" role="menuitem">
            <span class="menu-item-name">GPT-4o mini</span>
            <span class="menu-item-desc">Lightweight</span>
          </button>
          <button class="menu-item model-item" data-model="o3-mini" role="menuitem">
            <span class="menu-item-name">o3-mini</span>
            <span class="menu-item-desc">Reasoning</span>
          </button>
          <div class="menu-divider"></div>
          <div class="menu-section-label">Anthropic</div>
          <button class="menu-item model-item" data-model="claude-3-7-sonnet" role="menuitem">
            <span class="menu-item-name">Claude 3.7 Sonnet</span>
            <span class="menu-item-desc">Balanced</span>
          </button>
          <button class="menu-item model-item" data-model="claude-3-5-haiku" role="menuitem">
            <span class="menu-item-name">Claude 3.5 Haiku</span>
            <span class="menu-item-desc">Fast</span>
          </button>
          <div class="menu-divider"></div>
          <div class="menu-section-label">Google</div>
          <button class="menu-item model-item" data-model="gemini-2-flash" role="menuitem">
            <span class="menu-item-name">Gemini 2.0 Flash</span>
            <span class="menu-item-desc">Multimodal</span>
          </button>
        </div>
      </div>
      <button id="pin-btn" class="icon-btn pin-btn" title="Pin model for this site" aria-pressed="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
        </svg>
      </button>
    </div>

    <!-- Right cluster: actions -->
    <div id="header-actions">
      <!-- Page actions + button -->
      <div id="page-actions-wrap" style="position:relative;">
        <button id="page-actions-btn" class="icon-btn" title="Page actions" aria-haspopup="true" aria-expanded="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
        <div id="page-actions-menu" class="dropdown-menu" role="menu" style="display:none; top:calc(100% + 6px); right:0; left:auto; min-width:180px;">
          <button class="menu-item" id="action-screenshot" role="menuitem">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <span>Screenshot page</span>
          </button>
          <div class="menu-divider"></div>
          <button class="menu-item" id="action-copy-text" role="menuitem">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span>Copy page text</span>
          </button>
        </div>
      </div>

      <!-- Chat history -->
      <button id="history-btn" class="icon-btn" title="Chat history">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>

      <!-- New chat (compose icon) -->
      <button id="new-chat-btn" class="icon-btn" title="New chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>

      <!-- Settings -->
      <button id="settings-btn" class="icon-btn" title="Settings" aria-haspopup="true" aria-expanded="false">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>

      <!-- Theme toggle -->
      <button id="theme-btn" class="icon-btn" title="Toggle theme">
        <svg id="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════ CONTEXT BANNER ════════════════════════════════ -->
  <div id="context-banner" style="display:none;">
    <div id="context-banner-inner">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span id="context-banner-text">Reading page…</span>
    </div>
    <button id="context-dismiss" class="dismiss-btn" title="Dismiss">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- ════════════════════════════ AUTO-SUMMARY CARD ═══════════════════════════════ -->
  <div id="auto-summary-card" style="display:none;">
    <div id="auto-summary-header">
      <span id="auto-summary-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Page Summary
      </span>
      <button id="auto-summary-dismiss" class="dismiss-btn" title="Dismiss">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="auto-summary-content">Summarizing page…</div>
  </div>

  <!-- ════════════════════════════ MESSAGES AREA ══════════════════════════════════ -->
  <div id="messages-wrap">
    <div id="messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <!-- EMPTY STATE -->
    <div id="empty-state">
      <div id="empty-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <p id="empty-title">Ask anything about this page</p>
      <p id="empty-sub">Or try one of these prompts</p>
      <div id="suggestion-chips">
        <button class="chip" data-prompt="Summarize this page for me">Summarize page</button>
        <button class="chip" data-prompt="What are the key points?">Key points</button>
        <button class="chip" data-prompt="Explain this to me like I'm 5">ELI5</button>
        <button class="chip" data-prompt="What questions does this page leave unanswered?">Open questions</button>
      </div>
    </div>

    <!-- SELECTION PILL (floating above input) -->
    <div id="selection-pill" style="display:none;" role="status">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      <span id="selection-pill-text">Ask about: …</span>
      <button id="selection-pill-dismiss" class="dismiss-btn" title="Dismiss">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- ════════════════════════════ ERROR BAR ══════════════════════════════════════ -->
  <div id="error-bar" style="display:none;" role="alert">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="error-text">Something went wrong.</span>
    <button id="error-dismiss" class="dismiss-btn" title="Dismiss">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- ════════════════════════════ SLASH COMMAND PALETTE ══════════════════════════ -->
  <div id="slash-palette" style="display:none;" role="listbox" aria-label="Slash commands">
    <div class="slash-palette-header">Commands</div>
    <div id="slash-list">
      <button class="slash-item" data-command="/summarize" data-prompt="Summarize this page concisely." role="option">
        <span class="slash-cmd">/summarize</span>
        <span class="slash-desc">Summarize this page concisely</span>
      </button>
      <button class="slash-item" data-command="/tldr" data-prompt="Give me a TL;DR of this page." role="option">
        <span class="slash-cmd">/tldr</span>
        <span class="slash-desc">TL;DR of this page</span>
      </button>
      <button class="slash-item" data-command="/eli5" data-prompt="Explain this page like I'm 5." role="option">
        <span class="slash-cmd">/eli5</span>
        <span class="slash-desc">Explain like I'm 5</span>
      </button>
      <button class="slash-item" data-command="/translate" data-prompt="Translate this page to English." role="option">
        <span class="slash-cmd">/translate</span>
        <span class="slash-desc">Translate page to English</span>
      </button>
      <button class="slash-item" data-command="/keypoints" data-prompt="List the key points from this page." role="option">
        <span class="slash-cmd">/keypoints</span>
        <span class="slash-desc">List key points</span>
      </button>
      <button class="slash-item" data-command="/questions" data-prompt="What questions does this page leave unanswered?" role="option">
        <span class="slash-cmd">/questions</span>
        <span class="slash-desc">Unanswered questions</span>
      </button>
    </div>
    <div class="slash-palette-footer">
      <button id="open-templates-btn" class="slash-templates-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Templates
      </button>
    </div>
  </div>

  <!-- ════════════════════════════ INPUT WRAP ═════════════════════════════════════ -->
  <div id="input-wrap">
    <div id="input-box">
      <textarea
        id="chat-input"
        placeholder="Ask anything…"
        rows="1"
        aria-label="Chat input"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="btn-send" aria-label="Send message" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div id="input-footer">
      <!-- Token counter -->
      <span id="token-counter" class="token-counter">~0 tokens</span>
      <!-- Context mode toggle -->
      <button id="context-toggle" class="footer-pill active" title="Context mode" data-state="full">Full context</button>
      <!-- Stream toggle -->
      <button id="stream-toggle" class="footer-pill active" title="Streaming" data-state="on">Stream</button>
      <!-- Font size -->
      <button id="font-size-btn" class="footer-pill" title="Font size" data-size="m">Aa</button>
      <!-- Response length -->
      <button id="length-toggle" class="footer-pill" title="Response length" data-state="concise">Concise</button>
      <!-- Stop button (hidden by default) -->
      <button id="btn-stop" class="footer-pill stop-pill" style="display:none;" title="Stop generation">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
    </div>
  </div>

  <!-- ════════════════════════════ HISTORY PANEL ══════════════════════════════════ -->
  <div id="history-panel" role="dialog" aria-label="Chat history" aria-modal="true">
    <div id="history-header">
      <span id="history-title">History</span>
      <button id="history-close" class="icon-btn" title="Close history">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="history-list" role="list"></div>
    <div id="history-footer">
      <button id="history-clear-all" class="danger-btn">Clear all history</button>
    </div>
  </div>

  <!-- ════════════════════════════ PROMPT TEMPLATES PANEL ═════════════════════════ -->
  <div id="templates-panel" style="display:none;">
    <div id="templates-header">
      <span>Templates</span>
      <div style="display:flex; gap:6px; align-items:center;">
        <button id="save-template-btn" class="icon-btn" title="Save current input as template">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="templates-close" class="icon-btn" title="Close">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div id="templates-list"></div>
  </div>

  <!-- ════════════════════════════ SETUP OVERLAY ══════════════════════════════════ -->
  <div id="setup-overlay" style="display:none;">
    <div id="setup-card">
      <div id="setup-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      </div>
      <h2 id="setup-title">Welcome to Zen AI</h2>
      <p id="setup-sub">Enter your API key to get started</p>
      <input id="api-key-input" type="password" placeholder="sk-…" autocomplete="off" spellcheck="false" />
      <div id="setup-model-row">
        <label for="setup-model-select">Model</label>
        <select id="setup-model-select">
          <optgroup label="OpenAI">
            <option value="gpt-5.4">GPT-5.4</option>
            <option value="gpt-5.4-mini">GPT-5.4 mini</option>
            <option value="gpt-5.4-nano">GPT-5.4 nano</option>
            <option value="o3">o3</option>
            <option value="o4-mini">o4-mini</option>
            <option value="gpt-4o" selected>GPT-4o</option>
          </optgroup>
          <optgroup label="Anthropic">
            <option value="claude-opus-4-6">Claude Opus 4.6</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
            <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
            <option value="claude-3-7-sonnet-20250219">Claude 3.7 Sonnet</option>
          </optgroup>
          <optgroup label="Google">
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
            <option value="gemini-3.1-flash">Gemini 3.1 Flash</option>
            <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
          </optgroup>
          <optgroup label="Meta">
            <option value="meta-llama/llama-4-maverick">Llama 4 Maverick</option>
            <option value="meta-llama/llama-4-scout">Llama 4 Scout</option>
          </optgroup>
          <optgroup label="xAI">
            <option value="grok-4.20">Grok 4.20</option>
            <option value="grok-4.1-fast">Grok 4.1 Fast</option>
          </optgroup>
          <optgroup label="DeepSeek">
            <option value="deepseek/deepseek-r1">DeepSeek R1</option>
            <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
          </optgroup>
          <optgroup label="Mistral">
            <option value="mistral-small-2603">Mistral Small 4</option>
            <option value="mistral-large-latest">Mistral Large</option>
            <option value="codestral-latest">Codestral</option>
          </optgroup>
        </select>
      </div>
      <button id="setup-save-btn">Save &amp; Start</button>
    </div>
  </div>

  <!-- ════════════════════════════ TOAST ══════════════════════════════════════════ -->
  <div id="toast-container" aria-live="polite"></div>

</div><!-- /#app -->
<script src="panel.js"></script>
</body>
</html>
